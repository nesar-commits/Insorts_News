services:
  - type: web
    name: insorts-news-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ORIGINS
        sync: false
      - key: RSS_FETCH_INTERVAL_MINUTES
        value: "15"
      - key: ARTICLE_RETENTION_DAYS
        value: "3"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@insortsnews.example
      - key: PUSH_NOTIFICATION_COOLDOWN_MINUTES
        value: "30"
